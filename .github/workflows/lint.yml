name: Lint

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      luaVersion: '5.2'
    name: Lint
    steps:
      - uses: actions/checkout@v4
      
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check --glob "**/*.ttslua" .
